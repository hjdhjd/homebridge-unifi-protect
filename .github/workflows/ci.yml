name: "Continuous Integration"

on:
  pull_request:
  push:
  release:
    types: [ published ]
  workflow_dispatch:

# OIDC-related permissions for trusted publishing to NPMJS. The reusable workflow scopes id-token to the publish job, but GitHub requires the caller to grant the
# ceiling of permissions the reusable workflow can claim.
permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: hjdhjd/github-workflows/.github/workflows/nodejs-ci.yml@main
    secrets: inherit
