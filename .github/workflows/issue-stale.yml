name: "Close Stale Issues"

on:
  issues:
    types: [reopened]
  schedule:
    - cron: "0 * * * *"

# The reusable workflow narrows these to the stale job, but GitHub requires the caller to grant the ceiling of permissions the reusable workflow can claim.
permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    uses: hjdhjd/github-workflows/.github/workflows/issue-stale.yml@main
    secrets: inherit
