name: "Lock Threads"

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

# The reusable workflow narrows these to the lock job, but GitHub requires the caller to grant the ceiling of permissions the reusable workflow can claim.
permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    uses: hjdhjd/github-workflows/.github/workflows/lock-threads.yml@main
    secrets: inherit
